{{define "create_modal"}}
<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <div class="modal-header">
      <h2>Create Issue</h2>
      <button class="modal-close" onclick="closeModal('create-modal')">&times;</button>
    </div>
    <form hx-post="/web/create" hx-target="#ticket-list" hx-swap="afterbegin" hx-on::after-request="if(event.detail.successful) closeModal('create-modal')">
      <div class="modal-body">
        <div class="form-group">
          <label for="summary">Summary</label>
          <input type="text" id="summary" name="summary" required>
        </div>
        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" name="description"></textarea>
        </div>
        <div class="form-group">
          <label for="assignee">Assignee</label>
          <select id="assignee" name="assignee">
            <option value="">Unassigned</option>
            {{range .Users}}
            <option value="{{.Username}}">{{.DisplayName}}</option>
            {{end}}
          </select>
        </div>
        <div class="form-group">
          <label for="labels">Labels (comma-separated)</label>
          <input type="text" id="labels" name="labels" placeholder="bug, infra">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeModal('create-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Create</button>
      </div>
    </form>
  </div>
</div>
{{end}}
