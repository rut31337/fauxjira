---
- name: Deploy fauxjira to OpenShift
  hosts: localhost
  connection: local
  gather_facts: false

  pre_tasks:
    - name: Load local overrides if present
      ansible.builtin.include_vars:
        file: vars.local.yml
      failed_when: false

  vars:
    fauxjira_namespace: fauxjira
    fauxjira_git_repo: https://github.com/rut31337/fauxjira.git
    fauxjira_git_ref: main
    fauxjira_admin_password: "{{ lookup('password', '/dev/null length=16 chars=ascii_letters,digits') }}"
    fauxjira_user_password: "{{ lookup('password', '/dev/null length=16 chars=ascii_letters,digits') }}"
    fauxjira_storage_size: 1Gi
    fauxjira_port: "6778"

  tasks:
    - name: Create namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ fauxjira_namespace }}"

    - name: Create ImageStream
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: image.openshift.io/v1
          kind: ImageStream
          metadata:
            name: fauxjira
            namespace: "{{ fauxjira_namespace }}"

    - name: Create BuildConfig
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: build.openshift.io/v1
          kind: BuildConfig
          metadata:
            name: fauxjira
            namespace: "{{ fauxjira_namespace }}"
          spec:
            source:
              type: Git
              git:
                uri: "{{ fauxjira_git_repo }}"
                ref: "{{ fauxjira_git_ref }}"
            strategy:
              type: Docker
              dockerStrategy:
                dockerfilePath: Dockerfile
            output:
              to:
                kind: ImageStreamTag
                name: fauxjira:latest
            triggers:
              - type: ConfigChange

    - name: Get latest git commit
      ansible.builtin.command:
        cmd: git ls-remote {{ fauxjira_git_repo }} {{ fauxjira_git_ref }}
      register: git_remote
      changed_when: false

    - name: Set latest commit SHA
      ansible.builtin.set_fact:
        latest_commit: "{{ git_remote.stdout.split('\t')[0][:7] }}"

    - name: Check last successful build commit
      ansible.builtin.command:
        cmd: >-
          oc get builds -n {{ fauxjira_namespace }} -l buildconfig=fauxjira
          -o jsonpath='{range .items[?(@.status.phase=="Complete")]}{.spec.revision.git.commit}{"\n"}{end}'
      register: built_commits
      changed_when: false
      failed_when: false

    - name: Start build if source has changed
      ansible.builtin.command:
        cmd: oc start-build fauxjira -n {{ fauxjira_namespace }} --wait=false
      register: start_build
      changed_when: true
      when: latest_commit not in built_commits.stdout

    - name: Wait for build to complete
      ansible.builtin.command:
        cmd: >-
          oc get builds -n {{ fauxjira_namespace }} -l buildconfig=fauxjira
          -o jsonpath='{.items[-1:].status.phase}'
      register: build_phase
      until: build_phase.stdout in ['Complete', 'Failed', 'Error', 'Cancelled']
      retries: 60
      delay: 10
      changed_when: false
      when: latest_commit not in built_commits.stdout

    - name: Fail if build did not succeed
      ansible.builtin.fail:
        msg: "Build failed with phase: {{ build_phase.stdout }}"
      when:
        - latest_commit not in built_commits.stdout
        - build_phase.stdout != 'Complete'

    - name: Create PVC for SQLite storage
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: fauxjira-data
            namespace: "{{ fauxjira_namespace }}"
          spec:
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: "{{ fauxjira_storage_size }}"

    - name: Create Deployment
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: fauxjira
            namespace: "{{ fauxjira_namespace }}"
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: fauxjira
            template:
              metadata:
                labels:
                  app: fauxjira
              spec:
                containers:
                  - name: fauxjira
                    image: "image-registry.openshift-image-registry.svc:5000/{{ fauxjira_namespace }}/fauxjira:latest"
                    ports:
                      - containerPort: "{{ fauxjira_port | int }}"
                    env:
                      - name: FAUXJIRA_PORT
                        value: "{{ fauxjira_port }}"
                      - name: FAUXJIRA_ADMIN_PASSWORD
                        value: "{{ fauxjira_admin_password }}"
                      - name: FAUXJIRA_USER_PASSWORD
                        value: "{{ fauxjira_user_password }}"
                      - name: FAUXJIRA_DB_PATH
                        value: /data/fauxjira.db
                    volumeMounts:
                      - name: data
                        mountPath: /data
                    readinessProbe:
                      httpGet:
                        path: /rest/api/2/serverInfo
                        port: "{{ fauxjira_port | int }}"
                      initialDelaySeconds: 5
                      periodSeconds: 10
                volumes:
                  - name: data
                    persistentVolumeClaim:
                      claimName: fauxjira-data

    - name: Create Service
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: fauxjira
            namespace: "{{ fauxjira_namespace }}"
          spec:
            selector:
              app: fauxjira
            ports:
              - port: "{{ fauxjira_port | int }}"
                targetPort: "{{ fauxjira_port | int }}"

    - name: Create Route
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: route.openshift.io/v1
          kind: Route
          metadata:
            name: fauxjira
            namespace: "{{ fauxjira_namespace }}"
          spec:
            host: "{{ fauxjira_route_host | default(omit) }}"
            to:
              kind: Service
              name: fauxjira
            port:
              targetPort: "{{ fauxjira_port | int }}"
            tls:
              termination: edge
              insecureEdgeTerminationPolicy: Redirect

    - name: Wait for deployment to be ready
      kubernetes.core.k8s_info:
        kind: Deployment
        name: fauxjira
        namespace: "{{ fauxjira_namespace }}"
      register: deploy_info
      until: >-
        deploy_info.resources[0].status.readyReplicas | default(0) >= 1
      retries: 30
      delay: 10

    - name: Get Route URL
      kubernetes.core.k8s_info:
        kind: Route
        name: fauxjira
        namespace: "{{ fauxjira_namespace }}"
      register: route_info

    - name: Set fauxjira facts
      set_fact:
        fauxjira_url: "https://{{ route_info.resources[0].spec.host }}"
        fauxjira_admin_password: "{{ fauxjira_admin_password }}"
        fauxjira_user_password: "{{ fauxjira_user_password }}"
        fauxjira_user1: alice
        fauxjira_user2: bob

    - name: Display connection info
      debug:
        msg: |
          fauxjira deployed successfully!
          URL:            {{ fauxjira_url }}
          Admin password: {{ fauxjira_admin_password }}
          User password:  {{ fauxjira_user_password }}
          Demo users:     alice, bob
