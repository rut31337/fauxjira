{{define "head"}}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fauxjira</title>
<link rel="stylesheet" href="/static/style.css">
<script src="/static/htmx.min.js"></script>
{{end}}

{{define "navbar"}}
<nav class="navbar">
  <a href="/tickets" class="navbar-brand">
    <img src="/static/logo.png" alt="fauxjira">
    <span>fauxjira</span>
  </a>
  <div class="navbar-nav">
    <a href="/tickets" class="active">Tickets</a>
  </div>
  <div class="navbar-right">
    <div class="avatar avatar-lg" style="background:#00875a;">{{slice .CurrentUser.DisplayName 0 1}}</div>
  </div>
</nav>
{{end}}

{{define "scripts"}}
<script>
  function openModal(id) { document.getElementById(id).classList.add('active'); }
  function closeModal(id) { document.getElementById(id).classList.remove('active'); }
  function toggleDropdown(el) {
    el.closest('.dropdown').querySelector('.dropdown-menu').classList.toggle('active');
  }
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.dropdown')) {
      document.querySelectorAll('.dropdown-menu.active').forEach(m => m.classList.remove('active'));
    }
  });
</script>
{{end}}
